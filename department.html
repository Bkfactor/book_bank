<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department · Lead City Book Bank</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="department">

<div id="nav-slot"></div>

<div class="breadcrumb" id="breadcrumb"></div>

<section class="page-hero" id="dept-hero"></section>

<div class="container" id="dept-content">
  <section class="section">
    <div class="section-head">
      <h2>Available <span>Materials</span></h2>
    </div>

    <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px">
      <div>
        <p style="font-size:12px;color:var(--gray-400);margin-bottom:8px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase">Filter by Level</p>
        <div class="filter-row" id="level-filter" style="margin-bottom:0">
          <button class="filter-tab active" data-level="all">All Levels</button>
          <button class="filter-tab" data-level="100">100L</button>
          <button class="filter-tab" data-level="200">200L</button>
          <button class="filter-tab" data-level="300">300L</button>
          <button class="filter-tab" data-level="400">400L</button>
        </div>
      </div>
      <div>
        <p style="font-size:12px;color:var(--gray-400);margin-bottom:8px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase">Filter by Type</p>
        <div class="filter-row" id="type-filter-dept" style="margin-bottom:0">
          <button class="filter-tab active" data-type="all">All</button>
          <button class="filter-tab" data-type="notes">Notes</button>
          <button class="filter-tab" data-type="past">Past Q.</button>
          <button class="filter-tab" data-type="text">Textbooks</button>
          <button class="filter-tab" data-type="slides">Slides</button>
        </div>
      </div>
    </div>

    <div class="notice">
      📌 &nbsp;Files open directly from Google Drive. No login needed to view or download.
    </div>

    <div class="resource-grid" id="dept-resource-grid">
      <!-- Rendered by JS -->
    </div>

    <div style="margin-top:40px;padding:28px 32px;background:var(--blue-light);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <p style="font-size:14px;color:var(--blue-dark);font-weight:600">Don't see what you need?</p>
        <p style="font-size:13px;color:var(--gray-600);margin-top:3px">Browse the full Google Drive folder or submit a new material.</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a id="dept-drive-btn" href="#" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--blue);color:var(--blue);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;text-decoration:none">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Open Drive Folder
        </a>
        <a href="upload.html" style="display:inline-flex;align-items:center;gap:6px;background:var(--blue);color:white;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;text-decoration:none">
          + Submit a Material
        </a>
      </div>
    </div>
  </section>
</div>

<div id="footer-slot"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
